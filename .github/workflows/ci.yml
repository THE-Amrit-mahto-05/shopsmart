name: ShopSmart CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Test & Lint Backend
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        working-directory: server
        run: npm install
      - name: Run Tests
        working-directory: server
        run: npm test

  # Job 2: Test & Lint Frontend
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        working-directory: client
        run: npm install
      - name: Run Lint
        working-directory: client
        run: npm run lint || echo "Linting failed, but continuing for now"
      - name: Build
        working-directory: client
        run: npm run build
