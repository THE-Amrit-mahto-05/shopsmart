name: Deploy to AWS EC2
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via native SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          # 1. Setup SSH configuration securely
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # 2. SSH into the instance with legacy RSA flag enabled for AWS Academy keys
          ssh -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa $EC2_USER@$EC2_HOST << 'EOF'
            # Navigate to directory or clone if missing
            if [ ! -d "/home/$USER/shopsmart" ]; then
              git clone https://github.com/THE-Amrit-mahto-05/shopsmart /home/$USER/shopsmart
            fi
            cd /home/$USER/shopsmart
            
            git fetch --all
            git reset --hard origin/main
            
            chmod +x scripts/setup.sh
            ./scripts/setup.sh
            
            cd server && npm install --no-fund
            npx prisma generate
            
            # Restart backend
            if ! command -v pm2 &> /dev/null; then sudo npm install -g pm2; fi
            pm2 restart shopsmart-backend || pm2 start src/app.js --name shopsmart-backend
          EOF
