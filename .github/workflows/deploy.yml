name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem

      - name: Copy deploy script to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          HOST=$(echo "$EC2_HOST" | tr -d '[:space:]')
          USER_NAME=$(echo "$EC2_USER" | tr -d '[:space:]')
          scp -i ~/.ssh/ec2.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o PubkeyAcceptedKeyTypes=+ssh-rsa \
            -o HostKeyAlgorithms=+ssh-rsa \
            scripts/remote-deploy.sh ${USER_NAME}@${HOST}:~/remote-deploy.sh

      - name: Execute deploy script on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          HOST=$(echo "$EC2_HOST" | tr -d '[:space:]')
          USER_NAME=$(echo "$EC2_USER" | tr -d '[:space:]')
          ssh -i ~/.ssh/ec2.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o PubkeyAcceptedKeyTypes=+ssh-rsa \
            -o HostKeyAlgorithms=+ssh-rsa \
            -o ConnectTimeout=30 \
            ${USER_NAME}@${HOST} "chmod +x ~/remote-deploy.sh && ~/remote-deploy.sh"
