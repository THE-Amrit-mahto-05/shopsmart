name: Deploy to AWS EC2
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/shopsmart
            # Idempotent pull and fetch
            git fetch --all
            git reset --hard origin/main
            
            # Idempotent dependency install
            cd server && npm install --no-fund
            npx prisma generate
            
            # Restart service
            pm2 restart shopsmart-backend || pm2 start src/app.js --name shopsmart-backend
            
            # Frontend Build (if serving from the same EC2 or static hosting)
            cd ../client && npm install --no-fund && npm run build
