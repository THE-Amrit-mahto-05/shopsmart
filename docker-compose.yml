services:
  backend:
    image: amritkumarmahto005/shopsmart-backend:v3
    container_name: shopsmart-backend
    ports:
      - "5001:5000"   # host:container (IMPORTANT FIX)
    networks:
      - shopsmart-net
    depends_on:
      - mongo

  frontend:
    image: amritkumarmahto005/shopsmart-frontend:v3
    container_name: shopsmart-frontend
    ports:
      - "3000:3000"
    networks:
      - shopsmart-net
    depends_on:
      - backend

  mongo:
    image: mongo
    container_name: shopsmart-mongo
    ports:
      - "27017:27017"
    networks:
      - shopsmart-net

networks:
  shopsmart-net: